<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Movie Reviews</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff;
}

.movie-block {
    background: rgba(255,255,255,0.1);
    margin: 20px 0;
    padding: 20px;
    border-radius: 15px;
}

.movie-block h2 {
    color: #ff9800;
    margin-bottom: 10px;
}

.review-box {
    background: rgba(255,255,255,0.2);
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
}

.like-btn {
    color: pink;
    cursor: pointer;
    float: right;
}
</style>
</head>

<body>

<h1>🎬 All Movie Reviews</h1>

<div id="allReviews"></div>

<script>

// ✅ GET ALL REVIEWS FROM STORAGE
let allReviews = JSON.parse(localStorage.getItem("allReviews")) || {};

const container = document.getElementById("allReviews");

// check if empty
let hasData = false;

// loop through all movies
for (let movie in allReviews) {

    hasData = true;

    // movie section
    let movieBlock = document.createElement("div");
    movieBlock.className = "movie-block";

    let title = document.createElement("h2");
    title.innerText = movie;
    movieBlock.appendChild(title);

    // loop reviews of that movie
    allReviews[movie].forEach((r, i) => {

        let div = document.createElement("div");
        div.className = "review-box";

        div.innerHTML = `
            <b>${r.name}</b> ⭐ ${r.rating}
            <p>${r.review}</p>
            <p>Recommend: ${r.recommend}</p>
            <p>Watched via: ${r.format}</p>
            ❤️ ${r.likes}
        `;

        movieBlock.appendChild(div);
    });

    container.appendChild(movieBlock);
}

// if no data
if (!hasData) {
    container.innerHTML = "<h2>No reviews yet 😢</h2>";
}

</script>

</body>
</html>
