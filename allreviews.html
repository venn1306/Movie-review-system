<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Movie Reviews</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    padding: 20px;
}
h1 { text-align: center; color: #00ffff; text-shadow: 0 0 8px #00ffff; }

#viewBtn {
    display: block;
    margin: 30px auto;
    padding: 12px 25px;
    font-size: 18px;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
#viewBtn:hover { background: orange; }

.movie-block {
    background: rgba(255,255,255,0.1);
    margin: 20px 0;
    padding: 20px;
    border-radius: 15px;
}

.movie-block h2 {
    margin-top: 0;
    color: #ff9800;
}

.review-box {
    background: rgba(255,255,255,0.2);
    padding: 12px;
    margin: 12px 0;
    border-radius: 10px;
    position: relative;
}

.review-box:hover { box-shadow: 0 0 15px #00ffff; }

.like-btn {
    color: pink;
    cursor: pointer;
    position: absolute;
    top: 12px;
    right: 12px;
}

.movie-poster {
    width: 100px;
    border-radius: 5px;
    margin-right: 15px;
    vertical-align: middle;
}
</style>
</head>

<body>

<h1>All Movie Reviews</h1>
<button id="viewBtn">View All Reviews</button>

<div id="allReviews"></div>

<script>

// SAME MOVIE LIST
const movies = ["Titanic", "Avatar", "Avengers", "Joker", "The Dark Knight"];

// POSTERS
const data = {
    "Titanic": {poster: "https://image.tmdb.org/t/p/w500/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg"},
    "Avatar": {poster: "https://m.media-amazon.com/images/I/41kTVLeW1CL._AC_.jpg"},
    "Avengers": {poster: "https://m.media-amazon.com/images/I/71niXI3lxlL._AC_SL1024_.jpg"},
    "Joker": {poster: "https://m.media-amazon.com/images/I/61gtGlalRvL._AC_SY679_.jpg"},
    "The Dark Knight": {poster: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg"}
};

const container = document.getElementById("allReviews");
const viewBtn = document.getElementById("viewBtn");

// LOAD ALL REVIEWS BUTTON
viewBtn.addEventListener("click", () => {
    renderAllReviews();
    viewBtn.style.display = "none";
});

// MAIN FUNCTION
function renderAllReviews(){

    container.innerHTML = "";

    // ✅ NEW STORAGE SYSTEM
    let allReviews = JSON.parse(localStorage.getItem("allReviews")) || {};

    movies.forEach(movie => {

        let reviews = allReviews[movie] || [];

        if(reviews.length === 0) return;

        const movieBlock = document.createElement("div");
        movieBlock.className = "movie-block";

        const titleDiv = document.createElement("h2");
        titleDiv.innerHTML = `<img class="movie-poster" src="${data[movie].poster}"> ${movie}`;
        movieBlock.appendChild(titleDiv);

        reviews.forEach((r,i) => {

            const reviewDiv = document.createElement("div");
            reviewDiv.className = "review-box";

            reviewDiv.innerHTML = `
                <b>${r.name}</b> ⭐ ${r.rating}
                <p>${r.review}</p>
                <p>Recommend: ${r.recommend}</p>
                <p>Watched via: ${r.format}</p>
                <span class="like-btn" onclick="likeReview('${movie}', ${i})">❤️ ${r.likes}</span>
            `;

            movieBlock.appendChild(reviewDiv);
        });

        container.appendChild(movieBlock);
    });

    if(container.innerHTML.trim() === ""){
        container.innerHTML = "<p>No reviews yet for any movie!</p>";
    }
}

// ❤️ LIKE FUNCTION (FIXED)
function likeReview(movie, index){

    let allReviews = JSON.parse(localStorage.getItem("allReviews")) || {};
    let reviews = allReviews[movie] || [];

    reviews[index].likes++;

    allReviews[movie] = reviews;

    localStorage.setItem("allReviews", JSON.stringify(allReviews));

    renderAllReviews();
}

</script>

</body>
</html>
