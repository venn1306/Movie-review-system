<!DOCTYPE html>
<html>

<style>
body {

    background: #111;

}

}
</style>
</head>

<body>

<div id="reviews"></div>

const container = document.getElementById("reviews");

for(let movie in allReviews){

    // movie title heading
    let title = document.createElement("h2");
    title.innerText = movie;

    // reviews under that movie
    allReviews[movie].forEach(r => {
        let div = document.createElement("div");
        div.className = "review-box";
        div.innerHTML = `
            <b>${r.name}</b> ⭐ ${r.rating}
            <p>${r.review}</p>
            <p>Recommend: ${r.recommend}</p>
            <p>Watched via: ${r.format}</p>

        `;
        container.appendChild(div);
    });
}
